name: scheduled-tasks

on:
  schedule:
    # Fetch každý den 07:00 UTC
    - cron: "0 7 * * *"

    # Fetch každý den 19:00 UTC
    - cron: "0 19 * * *"

    # Reset každé pondělí 18:55 UTC
    - cron: "55 18 * * 1"

  workflow_dispatch:

jobs:
  fetch:
    if: github.event.schedule == '0 7 * * *' || github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run fetch
        run: python fetch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  reset:
    if: github.event.schedule == '55 18 * * 1'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run reset
        run: python reset.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
