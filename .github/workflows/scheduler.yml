name: scheduled-tasks

on:
  schedule:
    # každý den 8:00 Praha (07:00 UTC)
    - cron: "0 7 * * *"

    # každý den 20:00 Praha (19:00 UTC)
    - cron: "0 19 * * *"

    # pondělí 19:55 Praha (18:55 UTC)
    - cron: "55 18 * * 1"

  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide what to run
        run: |
          CURRENT_TIME=$(date -u +"%H:%M")
          DAY_OF_WEEK=$(date -u +"%u")

          echo "UTC Time: $CURRENT_TIME"
          echo "UTC Day: $DAY_OF_WEEK"

          if [ "$DAY_OF_WEEK" = "1" ] && [ "$CURRENT_TIME" = "18:55" ]; then
            echo "Running reset"
            python reset.py
          elif [ "$CURRENT_TIME" = "07:00" ] || [ "$CURRENT_TIME" = "19:00" ]; then
            echo "Running fetch"
            python fetch.py
          else
            echo "Nothing to run"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
