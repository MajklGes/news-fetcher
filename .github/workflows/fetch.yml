name: fetch

on:
  schedule:
    # Každý den 07:00 UTC (8:00 Praha zimní čas)
    - cron: "0 7 * * *"

    # Každý den 19:00 UTC (20:00 Praha zimní čas)
    - cron: "0 19 * * *"

  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch
        run: python fetch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
